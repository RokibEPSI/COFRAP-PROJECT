apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsar-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulsar-frontend
  template:
    metadata:
      labels:
        app: pulsar-frontend
    spec:
      containers:
      - name: frontend
        image: sikir/pulsar-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80 # Le port sur lequel ton Docker frontend écoute (souvent nginx ou apache)
---
apiVersion: v1
kind: Service
metadata:
  name: pulsar-frontend-service
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  selector:
    app: pulsar-frontend